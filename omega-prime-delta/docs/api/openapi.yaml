openapi: 3.0.3
info:
  title: Omega Prime Delta Control Plane API
  version: 1.0.0
  description: |
    Core health, risk validation, and allocation endpoints for Omega Prime Delta services.
servers:
  - url: https://api.omega-prime.local
paths:
  /health:
    get:
      summary: Global health probe
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /risk/validate:
    post:
      summary: Validate an order against risk limits
      operationId: validateOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskValidationRequest'
      responses:
        '200':
          description: Order passed risk checks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskValidationResponse'
        '400':
          description: Order rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /allocator/weights:
    post:
      summary: Calculate strategy allocation weights
      operationId: allocateWeights
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllocationRequest'
      responses:
        '200':
          description: Allocation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllocationResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    RiskValidationRequest:
      type: object
      required: [order]
      properties:
        order:
          type: object
          required: [symbol, side, qty]
          properties:
            symbol:
              type: string
            side:
              type: string
              enum: [BUY, SELL]
            qty:
              type: number
              minimum: 0
            price:
              type: number
              minimum: 0
    RiskValidationResponse:
      type: object
      required: [validated]
      properties:
        validated:
          type: boolean
        reasons:
          type: array
          items:
            type: string
    AllocationRequest:
      type: object
      required: [capital, signals]
      properties:
        capital:
          type: number
          minimum: 0
        maxWeight:
          type: number
          minimum: 0
          maximum: 1
          default: 0.4
        signals:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, score]
            properties:
              name:
                type: string
              score:
                type: number
    AllocationResponse:
      type: object
      required: [allocations]
      properties:
        allocations:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              weight:
                type: number
              amount:
                type: number
