name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Go test
        working-directory: backend
        run: go test ./...

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python smoke import
        working-directory: backend/cmd/strategy-engine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import main; print('strategy-engine import ok')"

      - name: Event sourcing + Redis utility unit tests
        run: |
          python -m pip install pytest redis
          PYTHONPATH=. pytest tests/unit/test_event_sourcing.py tests/unit/test_active_active_redis.py
