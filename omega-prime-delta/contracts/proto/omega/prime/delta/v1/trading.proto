syntax = "proto3";

package omega.prime.delta.v1;

option go_package = "github.com/omega-prime-delta/backend/gen/proto/omega/prime/delta/v1;deltav1";

message MarketTick {
  string symbol = 1;
  int64 event_unix_nano = 2;
  double bid = 3;
  double ask = 4;
  double last = 5;
  double volume = 6;
}

message OrderIntent {
  string order_id = 1;
  string strategy_id = 2;
  string account_id = 3;
  string symbol = 4;
  Side side = 5;
  OrderType order_type = 6;
  double quantity = 7;
  optional double limit_price = 8;
  optional double stop_price = 9;
  TimeInForce tif = 10;
  int64 created_unix_nano = 11;
}

message ExecutionFill {
  string order_id = 1;
  string venue = 2;
  double filled_qty = 3;
  double avg_fill_price = 4;
  int64 fill_unix_nano = 5;
}

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_MARKET = 1;
  ORDER_TYPE_LIMIT = 2;
  ORDER_TYPE_STOP = 3;
}

enum TimeInForce {
  TIME_IN_FORCE_UNSPECIFIED = 0;
  TIME_IN_FORCE_DAY = 1;
  TIME_IN_FORCE_GTC = 2;
  TIME_IN_FORCE_IOC = 3;
}
