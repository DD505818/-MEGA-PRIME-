version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: omega
      POSTGRES_PASSWORD: omega
      POSTGRES_DB: omega
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"

  risk-engine:
    build:
      context: ../backend
      dockerfile: Dockerfile.risk-engine
    command: ["go", "run", "./cmd/risk-engine"]
    environment:
      DATABASE_URL: postgres://omega:omega@postgres:5432/omega?sslmode=disable
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    ports:
      - "3002:3002"

  execution-router:
    build:
      context: ../backend
      dockerfile: Dockerfile.execution-router
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - kafka
    ports:
      - "8080:8080"

volumes:
  postgres_data:
