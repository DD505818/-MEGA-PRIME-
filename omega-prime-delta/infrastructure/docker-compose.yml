version: "3.9"
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: omega
      POSTGRES_PASSWORD: omega
      POSTGRES_DB: omega
    ports:
      - "5432:5432"

  risk-engine:
    build: ../backend
    command: ["go", "run", "./cmd/risk-engine"]
    environment:
      DATABASE_URL: postgres://omega:omega@postgres:5432/omega?sslmode=disable
      KAFKA_BROKERS: kafka:9092
    depends_on: [postgres, kafka]
    ports:
      - "3002:3002"

  execution-engine:
    build: ../backend
    command: ["go", "run", "./cmd/execution-engine"]
    environment:
      KAFKA_BROKERS: kafka:9092
      RISK_ENGINE_URL: http://risk-engine:3002
    depends_on: [kafka, redis, risk-engine]

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
