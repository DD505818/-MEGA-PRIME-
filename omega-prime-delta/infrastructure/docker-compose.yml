version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7-alpine

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: omega
      POSTGRES_PASSWORD: omega
      POSTGRES_DB: omega

  risk-engine:
    build: ../backend
    command: ["go", "run", "./cmd/risk-engine"]
    ports: ["3002:3002"]
    environment:
      DATABASE_URL: postgres://omega:omega@postgres:5432/omega?sslmode=disable
      KAFKA_BROKERS: kafka:9092
    depends_on: [postgres, kafka]

  execution-engine:
    build: ../backend
    command: ["go", "run", "./cmd/execution-engine"]
    environment:
      KAFKA_BROKERS: kafka:9092
      RISK_ENGINE_URL: http://risk-engine:3002
      REDIS_ADDR: redis:6379
    depends_on: [kafka, risk-engine, redis]

  frontend:
    build: ../frontend
    ports: ["3000:3000"]
