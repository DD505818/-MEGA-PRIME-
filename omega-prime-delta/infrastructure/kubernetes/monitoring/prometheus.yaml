apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: omega-prime-delta
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: omega-prime-services
        static_configs:
          - targets:
              - risk-engine:3002
              - execution-engine:3004
              - portfolio-service:3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: omega-prime-delta
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: omega-prime-delta
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
