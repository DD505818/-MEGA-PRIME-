apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpha-factory
  namespace: omega-prime-delta
  labels:
    app: alpha-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alpha-factory
  template:
    metadata:
      labels:
        app: alpha-factory
    spec:
      containers:
        - name: alpha-factory
          image: ghcr.io/omega-prime/alpha-factory:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8100
          env:
            - name: LOG_LEVEL
              value: INFO
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
