apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategy-engine
  namespace: omega-prime-delta
  labels:
    app: strategy-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: strategy-engine
  template:
    metadata:
      labels:
        app: strategy-engine
    spec:
      containers:
        - name: strategy-engine
          image: ghcr.io/omega-prime/strategy-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8104
          env:
            - name: LOG_LEVEL
              value: INFO
          livenessProbe:
            httpGet:
              path: /health
              port: 8104
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8104
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
