apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-predictor
  namespace: omega-prime-delta
  labels:
    app: price-predictor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-predictor
  template:
    metadata:
      labels:
        app: price-predictor
    spec:
      containers:
        - name: price-predictor
          image: ghcr.io/omega-prime/price-predictor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8103
          env:
            - name: LOG_LEVEL
              value: INFO
          livenessProbe:
            httpGet:
              path: /health
              port: 8103
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8103
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
