apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-predictor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-predictor
  template:
    metadata:
      labels:
        app: price-predictor
    spec:
      containers:
        - name: price-predictor
          image: price-predictor:latest
