apiVersion: apps/v1
kind: Deployment
metadata:
  name: capital-allocator
  namespace: omega-prime-delta
  labels:
    app: capital-allocator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: capital-allocator
  template:
    metadata:
      labels:
        app: capital-allocator
    spec:
      containers:
        - name: capital-allocator
          image: ghcr.io/omega-prime/capital-allocator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3005
          env:
            - name: LOG_LEVEL
              value: INFO
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
