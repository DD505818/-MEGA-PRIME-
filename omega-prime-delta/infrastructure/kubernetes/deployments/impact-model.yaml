apiVersion: apps/v1
kind: Deployment
metadata:
  name: impact-model
  namespace: omega-prime-delta
  labels:
    app: impact-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: impact-model
  template:
    metadata:
      labels:
        app: impact-model
    spec:
      containers:
        - name: impact-model
          image: ghcr.io/omega-prime/impact-model:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8101
          env:
            - name: LOG_LEVEL
              value: INFO
          livenessProbe:
            httpGet:
              path: /health
              port: 8101
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8101
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
