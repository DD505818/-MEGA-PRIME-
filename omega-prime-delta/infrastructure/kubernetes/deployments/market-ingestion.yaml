apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-ingestion
  namespace: omega-prime-delta
  labels:
    app: market-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-ingestion
  template:
    metadata:
      labels:
        app: market-ingestion
    spec:
      containers:
        - name: market-ingestion
          image: ghcr.io/omega-prime/market-ingestion:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: LOG_LEVEL
              value: INFO
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
