apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategy-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: strategy-engine
  template:
    metadata:
      labels:
        app: strategy-engine
    spec:
      containers:
      - name: strategy-engine
        image: omega-prime/strategy-engine:latest
        ports:
        - containerPort: 8000
