apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-data-service
  template:
    metadata:
      labels:
        app: market-data-service
    spec:
      containers:
      - name: market-data-service
        image: omega-prime/market-data-service:latest
        ports:
        - containerPort: 8000
