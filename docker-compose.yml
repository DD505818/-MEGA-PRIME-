version: '3.8'

services:
  # ── Infrastructure ───────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 15s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: omega
      POSTGRES_DB: omega
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db-migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d omega"]
      interval: 10s
      retries: 10

  # ── Data ingestion ───────────────────────────────────────────────────────────
  market-ingestion:
    build: ./apps/market-data-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      PAPER_MODE: ${PAPER_MODE:-true}
    restart: unless-stopped

  feature-engine:
    build: ./apps/feature-engine
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
    restart: unless-stopped

  # ── AI Strategy Engine ───────────────────────────────────────────────────────
  strategy-engine:
    build: ./apps/agent-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      PAPER_MODE: ${PAPER_MODE:-true}
      PORTFOLIO_EQUITY: ${PORTFOLIO_EQUITY:-100000}
    restart: unless-stopped

  # ── Fusion Engine (CAFÉ-RC) ──────────────────────────────────────────────────
  fusion-engine:
    build: ./apps/fusion-engine
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
    ports:
      - "8085:8085"
    restart: unless-stopped

  # ── Risk Engine (AEGIS Governor, 14 gates) ───────────────────────────────────
  risk-engine:
    build: ./apps/risk-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://postgres:omega@postgres:5432/omega}
      PAPER_MODE: ${PAPER_MODE:-true}
      MAX_DAILY_LOSS: ${MAX_DAILY_LOSS:-0.02}
      MAX_DRAWDOWN: ${MAX_DRAWDOWN:-0.10}
      MAX_POSITIONS: ${MAX_POSITIONS:-8}
      MAX_NOTIONAL_PER_TRADE: ${MAX_NOTIONAL_PER_TRADE:-50000}
      MAX_LEVERAGE: ${MAX_LEVERAGE:-2.0}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE:-0.60}
      RISK_PER_TRADE: ${RISK_PER_TRADE:-0.005}
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ── Execution Engine (VULTURE Protocol) ──────────────────────────────────────
  execution-engine:
    build: ./apps/execution-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      risk-engine:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      PAPER_MODE: ${PAPER_MODE:-true}
    ports:
      - "8081:8081"
    restart: unless-stopped

  # ── Capital Allocator (Kelly) ────────────────────────────────────────────────
  capital-allocator:
    build: ./apps/capital-allocator
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
    ports:
      - "8082:8082"
    restart: unless-stopped

  # ── Portfolio Service ────────────────────────────────────────────────────────
  portfolio-service:
    build: ./apps/portfolio-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://postgres:omega@postgres:5432/omega}
    ports:
      - "8083:8083"
    restart: unless-stopped

  # ── Truth-Core (Hash-Chained Audit) ──────────────────────────────────────────
  truth-core:
    build: ./apps/truth-core
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://postgres:omega@postgres:5432/omega}
    ports:
      - "8084:8084"
    restart: unless-stopped

  # ── LLM Service ──────────────────────────────────────────────────────────────
  llm-service:
    build: ./apps/llm-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    restart: unless-stopped

  # ── WebSocket Gateway ────────────────────────────────────────────────────────
  websocket-gateway:
    build: ./apps/websocket-gateway
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me}
      PORT: 3001
    ports:
      - "3001:3001"
    restart: unless-stopped

  # ── Web UI (Next.js 15) ───────────────────────────────────────────────────────
  web-ui:
    build: ./apps/web-ui
    depends_on:
      - websocket-gateway
    ports:
      - "3000:80"
    environment:
      NEXT_PUBLIC_WS_URL: ws://localhost:3001/ws
      NEXT_PUBLIC_API_URL: http://localhost:8080
    restart: unless-stopped

volumes:
  pgdata:
