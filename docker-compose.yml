version: '3.9'
services:
  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    depends_on:
      - zookeeper

  market-data-service:
    build: ./services/market-data-service
    depends_on: [kafka]
  feature-engine:
    build: ./services/feature-engine
    depends_on: [kafka]
  strategy-engine:
    build: ./services/strategy-engine
    depends_on: [kafka]
  rl-agent-cluster:
    build: ./services/rl-agent-cluster
    depends_on: [kafka]
  execution-router:
    build: ./services/execution-router
    depends_on: [kafka]
  risk-engine:
    build: ./services/risk-engine
    depends_on: [kafka]
  portfolio-service:
    build: ./services/portfolio-service
    depends_on: [kafka]
  backtesting-cluster:
    build: ./services/backtesting-cluster
    depends_on: [kafka]

  gateway-api:
    build: ./gateway-api
  dashboard:
    build: ./dashboard
    ports: ["3000:3000"]
  control-panel:
    build: ./control-panel
    ports: ["3001:3001"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
  grafana:
    image: grafana/grafana:latest
    ports: ["3002:3000"]
  alertmanager:
    image: prom/alertmanager:latest
