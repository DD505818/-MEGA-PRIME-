apiVersion: v1
kind: Namespace
metadata:
  name: omega-prime
  labels:
    name: omega-prime
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: omega-config
  namespace: omega-prime
data:
  kafka_brokers: "kafka:9092"
  paper_mode: "true"
  max_daily_loss: "0.02"
  max_drawdown: "0.10"
  max_positions: "8"
  risk_per_trade: "0.005"
  min_confidence: "0.60"
  portfolio_equity: "100000"
---
# Placeholder Secret — replace values with base64-encoded real credentials
apiVersion: v1
kind: Secret
metadata:
  name: omega-secrets
  namespace: omega-prime
type: Opaque
stringData:
  redis_url: "redis://redis:6379"
  postgres_dsn: "postgresql://postgres:omega@postgres:5432/omega"
  jwt_secret: "change-me-before-production"
---
apiVersion: v1
kind: Secret
metadata:
  name: broker-secrets
  namespace: omega-prime
type: Opaque
stringData:
  coinbase_api_key: "dummy"
  coinbase_api_secret: "dummy"
  kraken_api_key: "dummy"
  kraken_api_secret: "dummy"
  alpaca_api_key: "dummy"
  alpaca_api_secret: "dummy"
