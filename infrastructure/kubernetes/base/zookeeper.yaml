apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: omega-prime
spec:
  replicas: 1
  selector:
    matchLabels: { app: zookeeper }
  template:
    metadata:
      labels: { app: zookeeper }
    spec:
      containers:
        - name: zookeeper
          image: bitnami/zookeeper:3.9
