apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-senti
  namespace: omega-prime
  labels:
    app: agent-senti
    tier: strategy-agent
    version: v9.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-senti
  template:
    metadata:
      labels:
        app: agent-senti
        tier: strategy-agent
    spec:
      containers:
        - name: agent-senti
          image: omega-prime/agent-senti:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"
            - name: CONSUME_TOPIC
              value: "market.ticks"
            - name: PRODUCE_TOPIC
              value: "agents.senti.signals"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-senti
  namespace: omega-prime
spec:
  selector:
    app: agent-senti
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-senti-hpa
  namespace: omega-prime
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-senti
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
