apiVersion: apps/v1
kind: Deployment
metadata:
  name: zk-proof-service
  namespace: omega-prime
  labels:
    app: zk-proof-service
    tier: security
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zk-proof-service
  template:
    metadata:
      labels:
        app: zk-proof-service
        tier: security
    spec:
      containers:
        - name: zk-proof-service
          image: omega-prime/zk-proof-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: zk-proof-service
  namespace: omega-prime
spec:
  selector:
    app: zk-proof-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zk-proof-service-hpa
  namespace: omega-prime
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zk-proof-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
