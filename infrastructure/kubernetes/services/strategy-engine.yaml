apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategy-engine
  namespace: omega-prime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: strategy-engine
  template:
    metadata:
      labels:
        app: strategy-engine
    spec:
      containers:
        - name: strategy-engine
          image: omega-prime/strategy-engine:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: strategy-engine
  namespace: omega-prime
spec:
  selector:
    app: strategy-engine
  ports:
    - port: 8000
      targetPort: 8000
