apiVersion: apps/v1
kind: Deployment
metadata:
  name: backtesting-cluster
  namespace: omega-prime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backtesting-cluster
  template:
    metadata:
      labels:
        app: backtesting-cluster
    spec:
      containers:
        - name: backtesting-cluster
          image: omega-prime/backtesting-cluster:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: backtesting-cluster
  namespace: omega-prime
spec:
  selector:
    app: backtesting-cluster
  ports:
    - port: 8000
      targetPort: 8000
