apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
  namespace: omega-prime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-api
  template:
    metadata:
      labels:
        app: gateway-api
    spec:
      containers:
        - name: gateway-api
          image: omega-prime/gateway-api:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  namespace: omega-prime
spec:
  selector:
    app: gateway-api
  ports:
    - port: 8080
      targetPort: 8080
