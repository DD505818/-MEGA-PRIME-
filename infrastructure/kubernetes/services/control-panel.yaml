apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-panel
  namespace: omega-prime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-panel
  template:
    metadata:
      labels:
        app: control-panel
    spec:
      containers:
        - name: control-panel
          image: omega-prime/control-panel:latest
          ports:
            - containerPort: 3001
