apiVersion: apps/v1
kind: Deployment
metadata:
  name: rl-agent-cluster
  namespace: omega-prime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rl-agent-cluster
  template:
    metadata:
      labels:
        app: rl-agent-cluster
    spec:
      containers:
        - name: rl-agent-cluster
          image: omega-prime/rl-agent-cluster:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: rl-agent-cluster
  namespace: omega-prime
spec:
  selector:
    app: rl-agent-cluster
  ports:
    - port: 8000
      targetPort: 8000
