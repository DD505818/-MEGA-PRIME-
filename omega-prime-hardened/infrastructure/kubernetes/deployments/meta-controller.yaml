apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta-controller
  namespace: omega-prime
  labels:
    app: meta-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meta-controller
  template:
    metadata:
      labels:
        app: meta-controller
    spec:
      containers:
        - name: meta-controller
          image: omega/meta-controller:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: meta-controller
  namespace: omega-prime
spec:
  selector:
    app: meta-controller
  ports:
    - name: http
      port: 80
      targetPort: 8002
