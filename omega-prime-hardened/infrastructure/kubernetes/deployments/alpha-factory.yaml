apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpha-factory
  namespace: omega-prime
  labels:
    app: alpha-factory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alpha-factory
  template:
    metadata:
      labels:
        app: alpha-factory
    spec:
      containers:
        - name: alpha-factory
          image: omega/alpha-factory:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alpha-factory
  namespace: omega-prime
spec:
  selector:
    app: alpha-factory
  ports:
    - name: http
      port: 80
      targetPort: 8000
