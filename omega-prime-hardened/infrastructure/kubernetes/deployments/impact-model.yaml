apiVersion: apps/v1
kind: Deployment
metadata:
  name: impact-model
  namespace: omega-prime
  labels:
    app: impact-model
spec:
  replicas: 2
  selector:
    matchLabels:
      app: impact-model
  template:
    metadata:
      labels:
        app: impact-model
    spec:
      containers:
        - name: impact-model
          image: omega/impact-model:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: impact-model
  namespace: omega-prime
spec:
  selector:
    app: impact-model
  ports:
    - name: http
      port: 80
      targetPort: 8001
