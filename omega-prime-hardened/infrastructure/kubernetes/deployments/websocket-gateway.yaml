apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-gateway
  namespace: omega-prime
  labels:
    app: websocket-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-gateway
  template:
    metadata:
      labels:
        app: websocket-gateway
    spec:
      containers:
        - name: websocket-gateway
          image: omega/websocket-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-gateway
  namespace: omega-prime
spec:
  selector:
    app: websocket-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
