apiVersion: apps/v1
kind: Deployment
metadata:
  name: capital-allocator
  namespace: omega-prime
  labels:
    app: capital-allocator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capital-allocator
  template:
    metadata:
      labels:
        app: capital-allocator
    spec:
      containers:
        - name: capital-allocator
          image: omega/capital-allocator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3005
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: capital-allocator
  namespace: omega-prime
spec:
  selector:
    app: capital-allocator
  ports:
    - name: http
      port: 80
      targetPort: 3005
