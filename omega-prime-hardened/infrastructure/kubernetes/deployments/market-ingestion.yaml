apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-ingestion
  namespace: omega-prime
  labels:
    app: market-ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-ingestion
  template:
    metadata:
      labels:
        app: market-ingestion
    spec:
      containers:
        - name: market-ingestion
          image: omega/market-ingestion:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: market-ingestion
  namespace: omega-prime
spec:
  selector:
    app: market-ingestion
  ports:
    - name: http
      port: 80
      targetPort: 3001
