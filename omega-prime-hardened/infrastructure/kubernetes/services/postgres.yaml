apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: omega-prime
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: omega
            - name: POSTGRES_PASSWORD
              value: omega
            - name: POSTGRES_DB
              value: omega
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: omega-prime
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
