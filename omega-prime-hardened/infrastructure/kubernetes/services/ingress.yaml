apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omega-prime
  namespace: omega-prime
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: omega-prime.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api/risk
            pathType: Prefix
            backend:
              service:
                name: risk-engine
                port:
                  number: 80
          - path: /api/portfolio
            pathType: Prefix
            backend:
              service:
                name: portfolio-service
                port:
                  number: 80
