name: omega-prime-ci-cd
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build service images
        run: |
          for service in market-data-service feature-engine strategy-engine rl-agent-cluster execution-router risk-engine portfolio-service backtesting-cluster; do
            docker build -t omega-prime/${service}:latest ./services/${service}
          done
          docker build -t omega-prime/gateway-api:latest ./gateway-api
          docker build -t omega-prime/dashboard:latest ./dashboard
          docker build -t omega-prime/control-panel:latest ./control-panel

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Deploy manifests
        run: |
          kubectl apply -f infrastructure/kubernetes/base
          kubectl apply -f infrastructure/kubernetes/services
          kubectl apply -f infrastructure/kubernetes/monitoring
