name: Omega Prime Delta Placeholder Guard

on:
  pull_request:
    paths:
      - 'omega-prime-delta/**'
      - '.github/workflows/omega-prime-delta-placeholder-guard.yml'
  push:
    paths:
      - 'omega-prime-delta/**'
      - '.github/workflows/omega-prime-delta-placeholder-guard.yml'

jobs:
  placeholder-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate no sentinel placeholders in critical bootstrap files
        run: omega-prime-delta/scripts/check-placeholders.sh
